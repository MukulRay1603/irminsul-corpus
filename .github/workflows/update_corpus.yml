name: Weekly Corpus Update

on:
  schedule:
    - cron: "0 2 * * 0"   # every Sunday at 2am UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  update-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # 805 files + Gemini synthesis can take a while

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline — TCL + structured data
        run: python run_pipeline.py --steps tcl structured
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run pipeline — Gemini synthesis
        run: python run_pipeline.py --steps synthesize
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run pipeline — community signals
        # community step is best-effort — failures don't block ingest
        run: python run_pipeline.py --steps community || echo "Community step failed — continuing"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit updated docs back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git add logs/last_run.json || true
          git diff --staged --quiet || git commit -m "chore: weekly corpus update $(date -u '+%Y-%m-%d')"
          git push

      - name: Ingest updated docs into Pinecone
        # Runs after commit so the docs are saved even if ingest fails
        run: python run_pipeline.py --steps ingest
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX:   ${{ secrets.PINECONE_INDEX }}

      - name: Upload pipeline logs
        if: always()   # upload logs even if a step failed
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
